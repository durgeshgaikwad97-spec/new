name: ETL Pipeline

on:
  push:
    branches:
      - main
 transform-data-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run transform_data.py
        run: python transform_data.py

  load-data-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run load_data.py
        run: python load_data.py
